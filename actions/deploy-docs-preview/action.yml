name: 'Deploy Documentation Preview'
description: 'Download documentation artifact, deploy to preview hosting, and post a PR comment'

inputs:
  repo-name:
    description: 'Repository name (without owner) used in the preview domain (e.g. "hibernate-validator", "hibernate-search" ... )'
    required: true
  deploy-token:
    description: 'Authentication token for the preview hosting provider'
    required: true
  github-token:
    description: 'GitHub token for downloading artifacts and posting PR comments'
    required: true
  artifact-name:
    description: 'Name of the artifact to download'
    required: false
    default: 'docs-preview'

runs:
  using: "composite"
  steps:
    - name: Download documentation artifact
      id: download
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ./docs-preview/
        github-token: ${{ inputs.github-token }}
        repository: ${{ github.event.workflow_run.repository.full_name }}
        run-id: ${{ github.event.workflow_run.id }}
      continue-on-error: true

    - name: Determine PR number
      if: steps.download.outcome == 'success'
      id: pr-info
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        HEAD_BRANCH_NAME: ${{ github.event.workflow_run.head_branch }}
        FORK_OWNER: ${{ github.event.workflow_run.head_repository.owner.login }}
        REPO_OWNER: ${{ github.event.workflow_run.repository.owner.login }}
        REPO_FULL_NAME: ${{ github.event.workflow_run.repository.full_name }}
      run: |
        BRANCH_NAME="$HEAD_BRANCH_NAME"
        if [ "$FORK_OWNER" != "$REPO_OWNER" ]; then
          BRANCH_NAME="$FORK_OWNER:$BRANCH_NAME"
        fi

        GH_RESPONSE=$(gh pr view "$BRANCH_NAME" --repo "$REPO_FULL_NAME" --json number,headRefOid)
        PR_NUMBER=$(echo "$GH_RESPONSE" | jq -r '.number')
        HEAD_SHA=$(echo "$GH_RESPONSE" | jq -r '.headRefOid')

        if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
          echo "::error::Could not determine PR number for branch: $BRANCH_NAME"
          exit 1
        fi

        echo "pr-number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
        echo "head-sha=${HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"
        echo "::notice::PR #$PR_NUMBER, head SHA: ${HEAD_SHA:0:7}"

    - name: Deploy to Surge
      if: steps.download.outcome == 'success'
      id: deploy
      shell: bash
      env:
        SURGE_TOKEN: ${{ inputs.deploy-token }}
        DEPLOY_DOMAIN: "${{ inputs.repo-name }}-pr-${{ steps.pr-info.outputs.pr-number }}-preview.surge.sh"
      run: |
        npx surge@0.28.1 ./docs-preview/ "https://${DEPLOY_DOMAIN}"
        echo "url=https://$DEPLOY_DOMAIN" >> "$GITHUB_OUTPUT"

    - name: Post or update PR comment (success)
      if: steps.download.outcome == 'success' && steps.deploy.outcome == 'success'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO_FULL_NAME: ${{ github.event.workflow_run.repository.full_name }}
        PR_NUMBER: ${{ steps.pr-info.outputs.pr-number }}
        HEAD_SHA: ${{ steps.pr-info.outputs.head-sha }}
        DEPLOY_URL: ${{ steps.deploy.outputs.url }}
      run: |
        MARKER="<!-- docs-preview -->"
        BODY="${MARKER}
        ### Documentation Preview

        Preview deployed for commit ${HEAD_SHA}:
        ${DEPLOY_URL}

        _This preview will be removed when the PR is closed._"

        COMMENT_ID=$(gh api "repos/${REPO_FULL_NAME}/issues/${PR_NUMBER}/comments" --paginate \
          --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" 2>/dev/null | head -1 || true)

        if [ -n "$COMMENT_ID" ]; then
          gh api "repos/${REPO_FULL_NAME}/issues/${PR_NUMBER}/comments/${COMMENT_ID}" \
            -X PATCH -f body="$BODY"
          echo "::notice::Updated existing preview comment"
        else
          gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" --body "$BODY"
          echo "::notice::Created new preview comment"
        fi

    - name: Post or update PR comment (failure)
      if: steps.download.outcome == 'success' && steps.deploy.outcome == 'failure'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO_FULL_NAME: ${{ github.event.workflow_run.repository.full_name }}
        PR_NUMBER: ${{ steps.pr-info.outputs.pr-number }}
        HEAD_SHA: ${{ steps.pr-info.outputs.head-sha }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        MARKER="<!-- docs-preview -->"
        BODY="${MARKER}
        ### Documentation Preview

        Preview deployment failed for commit ${HEAD_SHA}.

        [View workflow run](${RUN_URL}) for details."

        COMMENT_ID=$(gh api "repos/${REPO_FULL_NAME}/issues/${PR_NUMBER}/comments" --paginate \
          --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" 2>/dev/null | head -1 || true)

        if [ -n "$COMMENT_ID" ]; then
          gh api "repos/${REPO_FULL_NAME}/issues/${PR_NUMBER}/comments/${COMMENT_ID}" \
            -X PATCH -f body="$BODY"
        else
          gh pr comment "$PR_NUMBER" --repo "$REPO_FULL_NAME" --body "$BODY"
        fi
