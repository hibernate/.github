name: 'Deploy Documentation Preview'
description: 'Download documentation artifact, deploy to preview hosting, and post a PR comment'

inputs:
  pr-number:
    description: 'Pull request number'
    required: true
  head-sha:
    description: 'Short head SHA for the PR comment'
    required: true
  artifact-name:
    description: 'Name of the artifact to download'
    required: false
    default: 'docs-preview'

runs:
  using: "composite"
  steps:
    - name: Download documentation artifact
      id: download
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.artifact-name }}
        path: ./docs-preview/
        github-token: ${{ github.token }}
        repository: ${{ github.event.repository.full_name }}
        run-id: ${{ github.event.workflow_run.id }}
      continue-on-error: true

    - name: Deploy to Surge
      if: steps.download.outcome == 'success'
      id: deploy
      shell: bash
      env:
        DEPLOY_DOMAIN: "${{ github.event.repository.name }}-pr-${{ inputs.pr-number }}-preview.surge.sh"
      run: |
        npx --ignore-scripts surge@0.31.1 ./docs-preview/ "https://${DEPLOY_DOMAIN}"
        echo "url=https://$DEPLOY_DOMAIN" >> "$GITHUB_OUTPUT"

    - name: Build doc index links
      if: steps.download.outcome == 'success' && steps.deploy.outcome == 'success'
      id: links
      shell: bash
      env:
        DEPLOY_URL: ${{ steps.deploy.outputs.url }}
      run: |
        LINKS=""
        while IFS= read -r file; do
          [ -z "$file" ] && continue
          rel_path="${file#./docs-preview/}"
          dir_path=$(dirname "$rel_path")
          if [ "$dir_path" = "." ]; then
            label="Home"
          else
            label=$(echo "$dir_path" | sed 's/[-_]/ /g; s|/| / |g; s/\b\w/\U&/g')
          fi
          LINKS="${LINKS}- [${label}](${DEPLOY_URL}/${rel_path})"$'\n'
        done < <(find ./docs-preview -name 'index.html' -type f | sort)

        if [ -z "$LINKS" ]; then
          LINKS="${DEPLOY_URL}"$'\n'
        fi

        {
          echo "doc-links<<EOF"
          printf '%s' "$LINKS"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Post or update PR comment (success)
      if: steps.download.outcome == 'success' && steps.deploy.outcome == 'success'
      uses: hibernate/.github/actions/upsert-pr-comment@f95c7959b0b60c30a8c006cf506f25141d759575
      with:
        marker: '<!-- docs-preview -->'
        pr-number: ${{ inputs.pr-number }}
        content: |-
          ### Documentation Preview

          Preview deployed for commit ${{ inputs.head-sha }}:

          ${{ steps.links.outputs.doc-links }}
          _This preview will be removed when the PR is closed._

    - name: Post or update PR comment (artifact not found)
      if: steps.download.outcome == 'failure'
      uses: hibernate/.github/actions/upsert-pr-comment@f95c7959b0b60c30a8c006cf506f25141d759575
      with:
        marker: '<!-- docs-preview -->'
        pr-number: ${{ inputs.pr-number }}
        content: |-
          ### Documentation Preview

          Documentation preview artifact not found for commit ${{ inputs.head-sha }}.
          The documentation may not have changed, or the artifact may have expired.

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.

    - name: Post or update PR comment (failure)
      if: steps.download.outcome == 'success' && steps.deploy.outcome == 'failure'
      uses: hibernate/.github/actions/upsert-pr-comment@f95c7959b0b60c30a8c006cf506f25141d759575
      with:
        marker: '<!-- docs-preview -->'
        pr-number: ${{ inputs.pr-number }}
        content: |-
          ### Documentation Preview

          Preview deployment failed for commit ${{ inputs.head-sha }}.

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
